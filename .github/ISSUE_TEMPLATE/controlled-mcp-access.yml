name: Controlled MCP access
description: Request production/private access to the protected Neura Relay MCP tool surface
title: "Controlled MCP access: "
labels:
  - controlled-access
  - mcp
body:
  - type: markdown
    attributes:
      value: |
        Start with Relay Workspace sandbox MCP for immediate first proof:
        https://www.neurarelay.com/developers/workspace

        This issue is for production/private MCP access beyond sandbox. Neura does not offer public production MCP token issuance.

        Share refs only. Do not paste customer data, private payloads, API keys, tokens, secrets, or proprietary policy content.

        Review the controlled beta operating path before requesting access:
        https://github.com/neurarelay/relay-action-card/blob/main/docs/controlled-mcp-beta-access.md
  - type: input
    id: company_project
    attributes:
      label: Company or project
      placeholder: "Acme agent platform"
    validations:
      required: true
  - type: input
    id: contact
    attributes:
      label: Contact
      description: GitHub handle, work email, or public profile
      placeholder: "@handle or name@example.com"
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Agent runtime
      options:
        - OpenAI Responses remote MCP
        - Claude Messages MCP connector
        - Claude Code remote HTTP MCP
        - Cursor or coding-agent MCP client
        - Custom MCP client
        - Other
    validations:
      required: true
  - type: dropdown
    id: action_category
    attributes:
      label: Proposed action category
      options:
        - Customer communication
        - CRM or record update
        - Refund or payment workflow
        - Deployment or production change
        - Data export or access
        - Other consequential action
    validations:
      required: true
  - type: dropdown
    id: agent_passport
    attributes:
      label: Registry Agent Passport status
      description: Production MCP use requires Registry-backed agent identity refs
      options:
        - Production Agent Passport created
        - Creating Agent Passport now
        - Need Registry guidance first
        - Demo proof only
    validations:
      required: true
  - type: input
    id: public_receipt_ref
    attributes:
      label: Public Action Card proof
      description: Share a Decision Receipt ref, sandbox MCP proof, or explain why proof cannot be run yet
      placeholder: "decision_receipt_..., sandbox MCP proof complete, or demo proof pending because ..."
    validations:
      required: true
  - type: checkboxes
    id: tools
    attributes:
      label: MCP tools requested
      options:
        - label: validate_action_card
        - label: resolve_action_card
        - label: get_decision_receipt
        - label: get_trace_replay
        - label: lookup_agent_passport
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: Describe the governed pre-action decision you want to prove without exposing private payloads
      placeholder: "Before our support agent sends a customer reply, Relay should validate Action Card shape, identity, authority, evidence refs, policy refs, and risk, then return a Decision Receipt"
    validations:
      required: true
  - type: textarea
    id: beta_proof_plan
    attributes:
      label: Beta proof plan
      description: Describe which runtime, tools, Action Card examples, receipt lookup, trace replay, and Agent Passport lookup you will verify
      placeholder: "We will run tools/list, validate_action_card, resolve_action_card, get_decision_receipt, get_trace_replay, and lookup_agent_passport against a safe support-reply Action Card"
    validations:
      required: true
  - type: input
    id: private_handoff_contact
    attributes:
      label: Private token handoff contact
      description: Provide the private contact path Neura should use if access is approved. Do not paste tokens here.
      placeholder: "work email, GitHub private contact, or other private handoff channel"
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundaries
      options:
        - label: I understand Workspace sandbox MCP is limited and production/private MCP access is controlled
          required: true
        - label: I understand any production/private token handoff must happen privately and tokens must not appear in GitHub issues, logs, screenshots, or Action Cards
          required: true
        - label: I understand Neura can rotate or revoke controlled beta access
          required: true
        - label: I understand Neura Relay returns a decision record and does not execute downstream actions
          required: true
        - label: I will not include private payloads, customer data, secrets, API keys, or access tokens in this issue
          required: true
