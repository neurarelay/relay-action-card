name: First receipt feedback
description: Share what happened after running the public Action Card example
title: "First receipt feedback: "
labels:
  - developer-feedback
  - first-receipt
body:
  - type: markdown
    attributes:
      value: |
        Use this after you run the public `POST /api/resolve` path and receive a Decision Receipt.

        Share refs only. Do not paste customer data, private payloads, API keys, tokens, secrets, or proprietary policy content.
  - type: dropdown
    id: example
    attributes:
      label: Which example did you run?
      options:
        - support-reply
        - refund-exception
        - data-export
        - payment-release
        - high-risk
        - other
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Agent runtime or framework
      description: Examples: OpenAI Responses, Claude, Cursor, CrewAI, LangChain, custom orchestration
      placeholder: "OpenAI Responses"
    validations:
      required: true
  - type: input
    id: receipt_ref
    attributes:
      label: Decision Receipt ref
      description: Paste the receipt id only, not the receipt payload
      placeholder: "decision_receipt_..."
    validations:
      required: true
  - type: input
    id: trace_ref
    attributes:
      label: Trace ref
      description: Paste the trace ref only, not private trace content
      placeholder: "trace_ref_..."
    validations:
      required: false
  - type: dropdown
    id: agent_passport
    attributes:
      label: Production Agent Passport status
      description: Demo cards include demo refs; production agents need Registry Agent Passport identity before Relay can validate standing
      options:
        - Demo card only
        - Production Agent Passport created
        - Need help creating Agent Passport
        - Not sure
    validations:
      required: true
  - type: textarea
    id: blocker
    attributes:
      label: What was unclear or blocked?
      description: Keep it implementation-specific and refs-only
      placeholder: "The receipt was clear, but I was not sure where to put the Registry capability version in my production Action Card"
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy boundary
      options:
        - label: I did not include private payloads, customer data, secrets, API keys, or access tokens
          required: true
